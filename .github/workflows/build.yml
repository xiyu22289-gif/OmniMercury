name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ========== Windows 打包 ==========
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # 关键：安装 Visual Studio C++ 构建工具，解决 better-sqlite3 编译问题
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        env:
          npm_config_vs_version: 2022   # 强制 node-gyp 使用 VS2022

      - name: Build app
        run: npm run build

      - name: Package Windows
        run: npm run dist -- --win --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: Windows-安装包
          path: release/*.exe

  # ========== macOS 打包 ==========
  build-macos:
    runs-on: macos-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm install

      - name: Build app
        run: npm run build

      - name: Package macOS
        run: npm run dist -- --mac --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: macOS-安装包
          path: |
            release/*.dmg
            release/*.zip

  # ========== Linux 打包 ==========
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libnss3-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcb1-dev \
            libxcb-keysyms1-dev \
            libxcb-shm0-dev \
            libxcb-util-dev \
            libxcb-xfixes0-dev \
            libxcb-xkb-dev \
            libxcomposite-dev \
            libxdamage-dev \
            libxrandr-dev \
            libgbm-dev \
            libpango1.0-dev \
            libcairo2-dev \
            libatk1.0-dev \
            libatk-bridge2.0-dev \
            libasound2-dev \
            librsvg2-dev \
            libxkbcommon-dev \
            build-essential

      - name: Install dependencies
        run: npm install

      - name: Build app
        run: npm run build

      - name: Package Linux
        run: npm run dist -- --linux --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: Linux-安装包
          path: |
            release/*.AppImage
            release/*.deb
